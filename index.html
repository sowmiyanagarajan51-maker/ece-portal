<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Portal | ECE Dept</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-100 font-sans min-h-screen flex flex-col justify-between text-slate-800">

    <header class="bg-blue-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-graduation-cap text-2xl text-amber-400"></i>
                <div>
                    <h1 class="text-sm font-bold uppercase tracking-wider">Student Registration Ledger</h1>
                    <p class="text-xs text-blue-200">Women's Engineering College — ECE Dept.</p>
                </div>
            </div>
            <a href="admin_login.html" class="text-xs bg-amber-500 hover:bg-amber-600 text-slate-900 px-3.5 py-2 rounded-lg font-bold transition flex items-center space-x-1">
                <i class="fa-solid fa-user-shield"></i> <span>Admin Portal</span>
            </a>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-10">
        <div class="bg-white max-w-2xl w-full rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="bg-gradient-to-r align-middle from-blue-900 to-indigo-900 p-6 text-white text-center space-y-1">
                <h2 class="text-xl font-bold tracking-tight">Create Departmental Profile</h2>
                <p class="text-xs text-slate-300">Fill your verified information accurately. Fields correspond to the master university registry matrix.</p>
            </div>

            <form id="registrationForm" onsubmit="handleStudentSubmit(event)" class="p-6 md:p-8 space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 text-xs">
                    <div class="space-y-1">
                        <label class="font-bold text-slate-600">1. Full Name</label>
                        <input type="text" id="studentName" required placeholder="Ex: Sowmiya N" class="w-full border border-slate-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-600 bg-slate-50">
                    </div>
                    <div class="space-y-1">
                        <label class="font-bold text-slate-600">2. Register Number</label>
                        <input type="text" id="registerNo" required placeholder="Ex: 921422106001" class="w-full border border-slate-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-600 bg-slate-50 font-mono">
                    </div>
                    <div class="space-y-1">
                        <label class="font-bold text-slate-600">3. Date of Birth</label>
                        <input type="date" id="dob" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-600 bg-slate-50">
                    </div>
                    <div class="space-y-1">
                        <label class="font-bold text-slate-600">4. Student Mobile No</label>
                        <input type="tel" id="studentMobile" required placeholder="Ex: 9876543210" class="w-full border border-slate-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-600 bg-slate-50 font-mono">
                    </div>
                    <div class="space-y-1">
                        <label class="font-bold text-slate-600">5. Institutional Email ID</label>
                        <input type="email" id="mailId" required placeholder="name@college.com" class="w-full border border-slate-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-600 bg-slate-50">
                    </div>
                    <div class="space-y-1">
                        <label class="font-bold text-slate-600">6. Parent / Guardian Mobile No</label>
                        <input type="tel" id="parentMobile" required placeholder="Ex: 9123456789" class="w-full border border-slate-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-600 bg-slate-50 font-mono">
                    </div>
                    <div class="space-y-1">
                        <label class="font-bold text-slate-600">7. Current Batch Year</label>
                        <select id="yearDropdown" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-600 bg-slate-50 font-medium">
                            <option value="" disabled selected>Select Year Category</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="font-bold text-slate-600">8. Active Semester</label>
                        <select id="semDropdown" required class="w-full border border-slate-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-600 bg-slate-50 font-medium">
                            <option value="" disabled selected>Select Current Semester</option>
                            <option value="Semester 1">Semester 1</option>
                            <option value="Semester 2">Semester 2</option>
                            <option value="Semester 3">Semester 3</option>
                            <option value="Semester 4">Semester 4</option>
                            <option value="Semester 5">Semester 5</option>
                            <option value="Semester 6">Semester 6</option>
                            <option value="Semester 7">Semester 7</option>
                            <option value="Semester 8">Semester 8</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1 text-xs">
                    <label class="font-bold text-slate-600">9. Complete Residential Permanent Address</label>
                    <textarea id="address" rows="2" required placeholder="Enter house number, street, city, pin code..." class="w-full border border-slate-300 p-2.5 rounded-lg focus:outline-none focus:border-blue-600 bg-slate-50"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3 rounded-xl shadow transition duration-150 text-xs tracking-wider uppercase mt-2">
                    Submit Secure Database Registration Packet
                </button>
            </form>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-500 text-center py-3.5 text-[11px]">
        <p>&copy; 2026 Women's Engineering College — Department Database Center</p>
    </footer>

    <script>
        function handleStudentSubmit(event) {
            event.preventDefault();

            const studentPayload = {
                name: document.getElementById('studentName').value,
                regNo: document.getElementById('registerNo').value,
                dob: document.getElementById('dob').value,
                address: document.getElementById('address').value,
                studentMobile: document.getElementById('studentMobile').value,
                mailId: document.getElementById('mailId').value,
                parentMobile: document.getElementById('parentMobile').value,
                year: document.getElementById('yearDropdown').value,
                semester: document.getElementById('semDropdown').value
            };

            // Save payload cleanly inside browser localStorage context
            let database = JSON.parse(localStorage.getItem('ece_students_db')) || [];
            database.push(studentPayload);
            localStorage.setItem('ece_students_db', JSON.stringify(database));

            alert("Data submitted successfully! Your profile has been logged.");
            document.getElementById('registrationForm').reset();
        }
    </script>
</body>
</html>
